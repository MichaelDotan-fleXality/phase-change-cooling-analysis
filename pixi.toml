[project]
name = "phase-change-cooling-analysis"
version = "0.1.0"
description = "Potential analysis tools for phase-change cooling systems"
channels = ["conda-forge"]
platforms = ["win-64", "linux-64", "osx-64"]

[dependencies]
python = ">=3.10"
pandas = ">=2.0.0"
numpy = ">=1.24.0"
matplotlib = ">=3.7.0"
plotly = ">=5.14.0"
openpyxl = ">=3.1.0"
scipy = ">=1.10.0"
pvlib = ">=0.10.0"
requests = ">=2.32.5,<3"
python-dotenv = ">=1.2.1,<2"
ipykernel = ">=6.25.0"
jupyter = ">=1.0.0"

[tasks]
install = "pip install -r requirements.txt"
run-example = "python run_example.py"
notebook = "jupyter notebook"

[feature.dev.dependencies]
python = ">=3.10"
jupyter = ">=1.0.0"
ipykernel = ">=6.25.0"

